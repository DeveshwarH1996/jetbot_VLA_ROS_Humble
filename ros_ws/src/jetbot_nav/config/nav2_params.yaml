# Nav2 configuration for JetBot: the "traditional pipeline" side of
# mode_arbiter. No static map / AMCL - jetbot_slam's monocular RTAB-Map
# does visual localization/loop-closure only, not an occupancy grid (see
# jetbot_slam's README), so both costmaps run rolling-window off the live
# camera-derived obstacle cloud (ground_plane_projector) instead of a
# pre-built map. Add map_server + amcl once a real occupancy-grid source
# (LiDAR via slam_toolbox, or a depth camera) exists.
#
# Footprint and velocity limits are matched to jetbot_description's URDF
# (10cm chassis box) and jetbot_base's motor_driver parameters
# (max_linear_vel/max_angular_vel/wheel_base) - keep these in sync if
# either changes.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.15
      stateful: true

    # Regulated Pure Pursuit: simpler to tune than DWB/MPPI and a good
    # default for a small differential-drive robot with no manipulator.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15       # < motor_driver's max_linear_vel (0.2), leaves headroom
      max_angular_accel: 2.0
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.3
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.05
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_vel: 1.0           # matches motor_driver's max_angular_vel
      min_turning_radius: 0.0        # differential drive can turn in place

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.05, 0.05], [0.05, -0.05], [-0.05, -0.05], [-0.05, 0.05]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /obstacles/points
          data_type: "PointCloud2"
          # No real per-detection height in a monocular ground-plane
          # projection (every point lands at z=0 by construction) -
          # min/max_obstacle_height just needs to bracket that.
          min_obstacle_height: -0.05
          max_obstacle_height: 0.5
          marking: true
          clearing: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # JetBot's ~7cm footprint radius plus margin - this needs real
        # tuning once actual detections/motion are flowing.
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.05, 0.05], [0.05, -0.05], [-0.05, -0.05], [-0.05, 0.05]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera_points
        camera_points:
          topic: /obstacles/points
          data_type: "PointCloud2"
          min_obstacle_height: -0.05
          max_obstacle_height: 0.5
          marking: true
          clearing: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      # pluginlib lookup name (package/ClassName) - the C++-namespace form
      # (nav2_navfn_planner::NavfnPlanner) that works for several other
      # Nav2 plugins is NOT registered for this one; confirmed by actually
      # launching it and reading the "Declared types are ..." error rather
      # than assumed from the other plugins' (different) convention.
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.2
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: odom
    global_frame: odom
    robot_base_frame: base_footprint
    behavior_plugins: ["spin", "backup", "wait"]
    # Same pluginlib lookup-name issue as GridBased above: package/ClassName
    # is the registered form for this package, not the C++ namespace form.
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    max_velocity: [0.2, 0.0, 1.0]     # matches motor_driver's max_linear_vel/max_angular_vel
    min_velocity: [-0.2, 0.0, -1.0]
    max_accel: [0.5, 0.0, 2.5]
    max_decel: [-0.5, 0.0, -2.5]
    odom_topic: /odometry/filtered

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    # nav2_bringup's navigation_launch.py starts smoother_server
    # unconditionally alongside these - omitting it from this list left it
    # configured but never activated, discovered by actually launching
    # the stack and reading which nodes started vs which were managed.
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
