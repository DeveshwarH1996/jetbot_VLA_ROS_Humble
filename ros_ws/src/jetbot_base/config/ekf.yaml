# robot_localization EKF: fuses motor_driver's continuous-but-drifty
# open-loop /odom into /odometry/filtered, and owns the odom->base_footprint
# TF (motor_driver's own broadcast of that TF must be disabled via its
# publish_tf:=false parameter when this is running - see bringup.launch.py).
#
# jetbot_slam's RTAB-Map continues to own map->odom TF unchanged - this EKF
# only operates at the odom level. Today there's only one input (wheel
# odom); this is the place to add an IMU or real encoders later without
# any downstream node needing to change.
ekf_filter_node:
  ros__parameters:
    frequency: 20.0
    two_d_mode: true                 # ground robot: no z/roll/pitch
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom                # this instance publishes odom->base_footprint, not map->odom

    odom0: odom                      # motor_driver's topic (remapped at launch if needed)
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
